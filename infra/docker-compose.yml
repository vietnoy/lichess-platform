version: "3.8"

services:

  postgres:
    image: postgres:16
    container_name: lichess-postgres
    environment:
      POSTGRES_DB: lichess
      POSTGRES_USER: lichess
      POSTGRES_PASSWORD: lichess
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lichess"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
