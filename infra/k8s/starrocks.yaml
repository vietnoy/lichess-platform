# ─── StarRocks FE ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: starrocks-fe
  namespace: chess
spec:
  replicas: 1
  selector:
    matchLabels:
      app: starrocks-fe
  template:
    metadata:
      labels:
        app: starrocks-fe
    spec:
      hostname: starrocks-fe
      initContainers:
        - name: wait-for-minio
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z minio 9000; do echo waiting for minio; sleep 2; done"]
      containers:
        - name: starrocks-fe
          image: starrocks/fe-ubuntu:4.0-latest
          command:
            - /bin/bash
            - -c
            - |
              echo "cloud_native_storage_type = S3" >> /opt/starrocks/fe/conf/fe.conf
              /opt/starrocks/fe/bin/start_fe.sh --host_type FQDN
          ports:
            - name: http
              containerPort: 8030
            - name: rpc
              containerPort: 9020
            - name: query
              containerPort: 9030
          securityContext:
            runAsUser: 0
          readinessProbe:
            tcpSocket:
              port: 9030
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 1Gi
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: starrocks-fe
  namespace: chess
spec:
  selector:
    app: starrocks-fe
  ports:
    - name: http
      port: 8030
      targetPort: 8030
    - name: rpc
      port: 9020
      targetPort: 9020
    - name: query
      port: 9030
      targetPort: 9030
---
apiVersion: v1
kind: Service
metadata:
  name: starrocks-fe-external
  namespace: chess
spec:
  type: NodePort
  selector:
    app: starrocks-fe
  ports:
    - port: 9030
      targetPort: 9030
      nodePort: 30930
---
# ─── StarRocks Init Job (sets root password once) ────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: starrocks-init
  namespace: chess
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-fe
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z starrocks-fe 9030; do echo waiting for starrocks-fe; sleep 3; done"]
      containers:
        - name: starrocks-init
          image: mysql:8.0
          command:
            - bash
            - -c
            - |
              mysql --connect-timeout 5 -h starrocks-fe -P 9030 -u root \
                -e "ALTER USER 'root'@'%' IDENTIFIED BY '$STARROCKS_PASSWORD';" || true
          envFrom:
            - secretRef:
                name: chess-secrets
  backoffLimit: 5
---
# ─── StarRocks CN ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: starrocks-cn
  namespace: chess
spec:
  replicas: 1
  selector:
    matchLabels:
      app: starrocks-cn
  template:
    metadata:
      labels:
        app: starrocks-cn
    spec:
      hostname: starrocks-cn-1
      initContainers:
        - name: wait-for-fe
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z starrocks-fe 9030; do echo waiting for starrocks-fe; sleep 3; done"]
      containers:
        - name: starrocks-cn
          image: starrocks/cn-ubuntu:4.0-latest
          command:
            - /bin/bash
            - -c
            - |
              sleep 15
              mysql --connect-timeout 2 -h starrocks-fe -P9030 -uroot \
                -e "ALTER SYSTEM ADD COMPUTE NODE 'starrocks-cn-1:9050';" || true
              /opt/starrocks/cn/bin/start_cn.sh
          ports:
            - containerPort: 8040
            - containerPort: 9050
          env:
            - name: TZ
              value: UTC
            - name: HOST_TYPE
              value: FQDN
          securityContext:
            runAsUser: 0
          readinessProbe:
            tcpSocket:
              port: 8040
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: 1Gi
              cpu: "1"
            limits:
              memory: 2Gi
              cpu: "2"
---
apiVersion: v1
kind: Service
metadata:
  name: starrocks-cn-1
  namespace: chess
spec:
  selector:
    app: starrocks-cn
  ports:
    - name: http
      port: 8040
      targetPort: 8040
    - name: heartbeat
      port: 9050
      targetPort: 9050
