# ─── Bootstrap Job (runs once to initialize Polaris schema in Postgres) ───────
apiVersion: batch/v1
kind: Job
metadata:
  name: polaris-bootstrap
  namespace: chess
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"]
      containers:
        - name: polaris-bootstrap
          image: apache/polaris-admin-tool:latest
          args: ["bootstrap", "-v", "3", "-r", "POLARIS", "-c", "$(POLARIS_BOOTSTRAP_CREDENTIALS)"]
          env:
            - name: POLARIS_PERSISTENCE_TYPE
              value: relational-jdbc
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: jdbc:postgresql://postgres:5432/polaris_db
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: chess-secrets
                  key: POSTGRES_USER
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chess-secrets
                  key: POSTGRES_PASSWORD
            - name: POLARIS_BOOTSTRAP_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: chess-secrets
                  key: POLARIS_BOOTSTRAP_CREDENTIALS
  backoffLimit: 3
---
# ─── Polaris Deployment ───────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polaris
  namespace: chess
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polaris
  template:
    metadata:
      labels:
        app: polaris
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"]
        - name: wait-for-minio
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z minio 9000; do echo waiting for minio; sleep 2; done"]
      containers:
        - name: polaris
          image: apache/polaris:latest
          ports:
            - containerPort: 8181
          env:
            - name: POLARIS_PERSISTENCE_TYPE
              value: relational-jdbc
            - name: QUARKUS_DATASOURCE_JDBC_URL
              valueFrom:
                configMapKeyRef:
                  name: chess-config
                  key: POLARIS_DB_URL
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: chess-secrets
                  key: POSTGRES_USER
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chess-secrets
                  key: POSTGRES_PASSWORD
            - name: QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION
              value: update
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: chess-secrets
                  key: MINIO_ACCESS_KEY
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: chess-secrets
                  key: MINIO_SECRET_KEY
            - name: AWS_REGION
              value: us-east-1
            - name: AWS_ENDPOINT_URL
              value: http://minio:9000
            - name: AWS_S3_ENDPOINT
              value: http://minio:9000
            - name: AWS_S3_USE_PATH_STYLE_ENDPOINT
              value: "true"
            - name: POLARIS_BOOTSTRAP_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: chess-secrets
                  key: POLARIS_BOOTSTRAP_CREDENTIALS
          readinessProbe:
            tcpSocket:
              port: 8181
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: polaris
  namespace: chess
spec:
  selector:
    app: polaris
  ports:
    - port: 8181
      targetPort: 8181
---
# ─── Setup Job (runs once to create catalog, namespace, tables, principals) ───
apiVersion: batch/v1
kind: Job
metadata:
  name: polaris-setup
  namespace: chess
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-polaris
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z polaris 8181; do echo waiting for polaris; sleep 3; done"]
      containers:
        - name: polaris-setup
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              until [ -f /git/repo/infra/setup_polaris.py ]; do echo "waiting for git-sync..."; sleep 2; done
              pip install -q requests python-dotenv &&
              python /git/repo/infra/setup_polaris.py
          envFrom:
            - configMapRef:
                name: chess-config
            - secretRef:
                name: chess-secrets
          volumeMounts:
            - name: git-data
              mountPath: /git
        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.2.1
          args:
            - --repo=https://github.com/vietnoy/lichess-platform
            - --branch=main
            - --depth=1
            - --period=30s
            - --root=/git
            - --link=repo
            - --one-time
          volumeMounts:
            - name: git-data
              mountPath: /git
      volumes:
        - name: git-data
          emptyDir: {}
  backoffLimit: 3
