apiVersion: apps/v1
kind: Deployment
metadata:
  name: starrocks-fe
  namespace: chess
spec:
  replicas: 1
  selector:
    matchLabels:
      app: starrocks-fe
  template:
    metadata:
      labels:
        app: starrocks-fe
    spec:
      hostname: starrocks-fe
      initContainers:
        - name: wait-for-minio
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z minio 9000; do echo waiting for minio; sleep 2; done"]
      containers:
        - name: starrocks-fe
          image: starrocks/fe-ubuntu:4.0-latest
          command:
            - /bin/bash
            - -c
            - |
              echo "cloud_native_storage_type = S3" >> /opt/starrocks/fe/conf/fe.conf
              /opt/starrocks/fe/bin/start_fe.sh --host_type FQDN
          ports:
            - name: http
              containerPort: 8030
            - name: rpc
              containerPort: 9020
            - name: query
              containerPort: 9030
          securityContext:
            runAsUser: 0
          readinessProbe:
            tcpSocket:
              port: 9030
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 1Gi
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: starrocks-fe
  namespace: chess
spec:
  selector:
    app: starrocks-fe
  ports:
    - name: http
      port: 8030
      targetPort: 8030
    - name: rpc
      port: 9020
      targetPort: 9020
    - name: query
      port: 9030
      targetPort: 9030
---
# Expose StarRocks query port externally for mysql client
apiVersion: v1
kind: Service
metadata:
  name: starrocks-fe-external
  namespace: chess
spec:
  type: NodePort
  selector:
    app: starrocks-fe
  ports:
    - port: 9030
      targetPort: 9030
      nodePort: 30930
