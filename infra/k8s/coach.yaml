apiVersion: apps/v1
kind: Deployment
metadata:
  name: coach
  namespace: chess
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coach
  template:
    metadata:
      labels:
        app: coach
    spec:
      containers:
        - name: coach
          image: vietnoy/chess-coach:latest
          imagePullPolicy: Always
          ports:
            - name: streamlit
              containerPort: 8501
            - name: api
              containerPort: 8000
          command:
            - /bin/sh
            - -c
            - |
              uvicorn agent:app --host 0.0.0.0 --port 8000 &
              streamlit run app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
          envFrom:
            - configMapRef:
                name: chess-config
            - secretRef:
                name: chess-secrets
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /secrets/gcp/service_account.json
          volumeMounts:
            - name: gcp-sa
              mountPath: /secrets/gcp
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 500m
      volumes:
        - name: gcp-sa
          secret:
            secretName: gcp-sa-secret
---
apiVersion: v1
kind: Service
metadata:
  name: coach
  namespace: chess
spec:
  selector:
    app: coach
  ports:
    - name: streamlit
      port: 8501
      targetPort: 8501
    - name: api
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: coach-external
  namespace: chess
spec:
  type: NodePort
  selector:
    app: coach
  ports:
    - name: streamlit
      port: 8501
      targetPort: 8501
      nodePort: 30051
