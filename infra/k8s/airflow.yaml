apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-logs-pvc
  namespace: chess
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
# ─── Init Job ─────────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-init
  namespace: chess
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"]
      containers:
        - name: airflow-init
          image: vietnoy/chess-airflow:latest
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -c
            - |
              airflow db migrate
              airflow users create \
                --username admin \
                --password $AIRFLOW_ADMIN_PASSWORD \
                --firstname Admin --lastname User \
                --role Admin \
                --email admin@chessanalytics.local || true
          envFrom:
            - configMapRef:
                name: chess-config
            - secretRef:
                name: chess-secrets
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: postgresql+psycopg2://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/airflow_db
            - name: AIRFLOW__WEBSERVER__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: chess-secrets
                  key: AIRFLOW_SECRET_KEY
            - name: AIRFLOW__API__AUTH_RUNTIME_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chess-secrets
                  key: AIRFLOW_SECRET_KEY
            - name: AIRFLOW__API_AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chess-secrets
                  key: AIRFLOW_SECRET_KEY
          volumeMounts:
            - name: logs
              mountPath: /opt/airflow/logs
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: airflow-logs-pvc
  backoffLimit: 3
---
# ─── API Server ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-apiserver
  namespace: chess
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-apiserver
  template:
    metadata:
      labels:
        app: airflow-apiserver
    spec:
      containers:
        - name: airflow-apiserver
          image: vietnoy/chess-airflow:latest
          imagePullPolicy: Always
          command: ["airflow", "api-server", "--workers", "1"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: chess-config
            - secretRef:
                name: chess-secrets
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: postgresql+psycopg2://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/airflow_db
            - name: AIRFLOW__WEBSERVER__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: chess-secrets
                  key: AIRFLOW_SECRET_KEY
            - name: AIRFLOW__API__AUTH_RUNTIME_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chess-secrets
                  key: AIRFLOW_SECRET_KEY
            - name: AIRFLOW__API_AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chess-secrets
                  key: AIRFLOW_SECRET_KEY
            - name: AIRFLOW__CORE__DAGS_FOLDER
              value: /git/repo/dags
          readinessProbe:
            httpGet:
              path: /api/v2/version
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 10
          resources:
            requests:
              memory: 512Mi
              cpu: 100m
            limits:
              memory: 1500Mi
              cpu: 500m
          volumeMounts:
            - name: git-data
              mountPath: /git
            - name: logs
              mountPath: /opt/airflow/logs
        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.2.1
          args:
            - --repo=https://github.com/vietnoy/lichess-platform
            - --branch=main
            - --depth=1
            - --period=30s
            - --root=/git
            - --link=repo
          volumeMounts:
            - name: git-data
              mountPath: /git
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 100m
      volumes:
        - name: git-data
          emptyDir: {}
        - name: logs
          persistentVolumeClaim:
            claimName: airflow-logs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-apiserver
  namespace: chess
spec:
  selector:
    app: airflow-apiserver
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-ui
  namespace: chess
spec:
  type: NodePort
  selector:
    app: airflow-apiserver
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30808
---
