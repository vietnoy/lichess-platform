---
apiVersion: v1
kind: Service
metadata:
  name: airflow-scheduler
  namespace: chess
spec:
  selector:
    app: airflow-scheduler
  clusterIP: None
  ports:
    - name: spark-driver
      port: 20002
      targetPort: 20002
    - name: spark-blockmanager
      port: 20003
      targetPort: 20003
---
