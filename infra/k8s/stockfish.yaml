apiVersion: apps/v1
kind: Deployment
metadata:
  name: stockfish
  namespace: chess
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stockfish
  template:
    metadata:
      labels:
        app: stockfish
    spec:
      containers:
        - name: stockfish
          image: vietnoy/chess-stockfish:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: stockfish
  namespace: chess
spec:
  selector:
    app: stockfish
  ports:
    - port: 8001
      targetPort: 8001
